
<!DOCTYPE html>

<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons</title>

<meta name="theme-color" content="#6C63FF">

<style>
:root{
  --primary:#6C63FF;
  --bg:#f5f6fa;
  --green:#00C853;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}

body{background:var(--bg)}

/* Header */
.header{
  background:linear-gradient(135deg,#6C63FF,#8E7CFF);
  padding:20px;
  color:#fff;
}

.search input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
}

/* Cards */
.container{
  padding:15px;
  padding-bottom:100px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
  cursor:pointer;
  transition:.2s;
}

.card:hover{transform:translateY(-3px)}

.left{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:45px;
  height:45px;
  border-radius:10px;
  object-fit:contain;
  background:#fff;
  padding:5px;
  border:1px solid #eee;
}

.brand{font-weight:bold;font-size:14px}
.code{color:var(--primary);font-size:13px}

/* Buttons */
.actions{display:flex;gap:6px}

button{
  border:none;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}

.copy{background:var(--primary);color:#fff}
.save{background:#eee}

/* Nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#fff;
  border-top:1px solid #ddd;
}

.nav button{
  flex:1;
  padding:12px;
  background:none;
}

.active{color:var(--primary);font-weight:bold}

/* Toast */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:var(--green);
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
</style>

</head>

<body>

<div class="header">
  <h2>🔥 كوبونات</h2>
  <div class="search">
    <input id="search" placeholder="ابحث عن متجر أو كود">
  </div>
</div>

<div class="container" id="list"></div>

<div class="nav">
  <button id="allBtn" class="active" onclick="showAll()">الكل</button>
  <button id="savedBtn" onclick="showSaved()">المحفوظة</button>
  <button onclick="showOffers()">العروض</button>
</div>

<div class="toast" id="toast"></div>

<script>
const coupons = [
{brand:"Izil Beauty",code:"MM90",logo:"images/izil.png",link:"https://izilbeauty.com"},
{brand:"Reef Perfume",code:"REE2",logo:"images/reef.png",link:"https://reefperfumes.com"},
{brand:"Metro Brazil",code:"VRS23",logo:"images/metro.png",link:"https://metrobrazil.com"},
{brand:"Nayomi",code:"NEW93",logo:"images/nayomi.png",link:"https://nayomi.com"},
{brand:"مفارش العييري",code:"KY43",logo:"images/ayyari.png",link:"#"}
];

let saved = JSON.parse(localStorage.getItem("savedCoupons")) || [];

function render(data){
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach(c=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="left">
        <img class="logo" src="${c.logo}">
        <div>
          <div class="brand">${c.brand}</div>
          <div class="code">${c.code}</div>
        </div>
      </div>
      <div class="actions">
        <button class="copy">Copy</button>
        <button class="save">${saved.find(s=>s.code===c.code)?"✔":"Save"}</button>
      </div>
    `;

    card.onclick=()=>window.open(c.link,"_blank");

    card.querySelector(".copy").onclick=(e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(c.code);
      toast("Copied!");
    };

    card.querySelector(".save").onclick=(e)=>{
      e.stopPropagation();
      if(!saved.find(s=>s.code===c.code)){
        saved.push(c);
        localStorage.setItem("savedCoupons",JSON.stringify(saved));
        toast("Saved!");
        render(coupons);
      }
    };

    list.appendChild(card);
  });
}

document.getElementById("search").oninput=(e)=>{
  const v=e.target.value.toLowerCase();
  render(coupons.filter(c=>
    c.brand.toLowerCase().includes(v) ||
    c.code.toLowerCase().includes(v)
  ));
};

function showAll(){render(coupons);}
function showSaved(){render(saved);}
function showOffers(){toast("قريباً 🚀");}

function toast(msg){
  const t=document.getElementById("toast");
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

render(coupons);
</script>

</body>
</html>
