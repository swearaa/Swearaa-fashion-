<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coupons App</title>

<!-- PWA Style -->

<meta name="theme-color" content="#6C63FF">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
:root{
  --primary:#6C63FF;
  --bg:#f4f6fb;
  --green:#00C853;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

body{
  background:var(--bg);
}

/* Header */
.header{
  background:linear-gradient(135deg,#6C63FF,#8E7CFF);
  padding:20px;
  color:#fff;
  position:sticky;
  top:0;
  z-index:10;
}

.header h2{
  margin-bottom:10px;
}

.search input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  outline:none;
}

/* Container */
.container{
  padding:15px;
  padding-bottom:90px;
}

/* Card */
.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  box-shadow:0 6px 15px rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:translateY(-4px);
}

.brand{
  font-weight:600;
}

.code{
  color:var(--primary);
  margin-top:6px;
  font-size:18px;
}

/* Actions */
.actions{
  display:flex;
  gap:10px;
}

button{
  border:none;
  padding:8px 12px;
  border-radius:10px;
  cursor:pointer;
}

.copy{
  background:var(--primary);
  color:#fff;
}

.save{
  background:#eee;
}

/* Bottom Nav */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:#fff;
  border-top:1px solid #ddd;
}

.nav button{
  flex:1;
  padding:12px;
  background:none;
}

.active{
  color:var(--primary);
  font-weight:bold;
}

/* Toast */
.toast{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:var(--green);
  color:#fff;
  padding:10px 20px;
  border-radius:20px;
  opacity:0;
  transition:.3s;
}

.toast.show{
  opacity:1;
}
</style>

</head>

<body>

<div class="header">
  <h2>🔥 Coupons</h2>
  <div class="search">
    <input id="search" placeholder="Search by brand or code...">
  </div>
</div>

<div class="container" id="list"></div>

<div class="nav">
  <button id="allBtn" class="active" onclick="showAll()">All</button>
  <button id="savedBtn" onclick="showSaved()">Saved</button>
  <button onclick="showOffers()">Offers</button>
</div>

<div class="toast" id="toast"></div>

<script>
// DATA (from your image)
const coupons = [
{brand:"Vogacloset", code:"GGG", link:"https://vogacloset.com"},
{brand:"Vogacloset", code:"GM", link:"https://vogacloset.com"},
{brand:"Mamas and Papas", code:"ADL12", link:"https://mamasandpapas.com"},
{brand:"Styli", code:"TSSS", link:"https://styli.com"},
{brand:"Mumzworld", code:"ADL33", link:"https://mumzworld.com"},
{brand:"Mumzworld", code:"XV9", link:"https://mumzworld.com"},
{brand:"NOON", code:"ZZZ10", link:"https://noon.com"},
{brand:"NOON", code:"SWE22", link:"https://noon.com"},
{brand:"Selen", code:"S80", link:"#"},
{brand:"Metro Brazil", code:"VRS23", link:"https://metrobrazil.com"},
{brand:"Metro Brazil", code:"AD55", link:"https://metrobrazil.com"},
{brand:"FirstCry", code:"DT", link:"https://firstcry.com"},
{brand:"Izil Beauty", code:"MM90", link:"https://izilbeauty.com"},
{brand:"Nayomi", code:"NEW93", link:"https://nayomi.com"},
{brand:"Namshi", code:"SW7", link:"https://namshi.com"},
{brand:"Max Fashion", code:"ATRD", link:"https://maxfashion.com"},
{brand:"Trendyol", code:"SWEA", link:"https://trendyol.com"},
{brand:"Al Ayyari", code:"KY43", link:"#"},
{brand:"Bloomingdale's", code:"ADL3", link:"#"},
{brand:"Reef Perfume", code:"REE2", link:"https://reefperfumes.com"},
{brand:"Sandro", code:"SAN40", link:"#"},
{brand:"6thStreet", code:"EB52", link:"#"},
{brand:"Golden Scent", code:"G4WQ", link:"#"},
{brand:"Riva", code:"SKK6", link:"#"},
{brand:"Eyewa", code:"KSA19", link:"#"},
{brand:"Level Shoes", code:"LEV67", link:"#"},
{brand:"Nice One", code:"S67", link:"#"}
];

let savedCoupons = JSON.parse(localStorage.getItem("savedCoupons")) || [];

// Render
function render(list){
  const container = document.getElementById("list");
  container.innerHTML = "";

  if(list.length === 0){
    container.innerHTML = "<p style='text-align:center;color:#999'>No results</p>";
    return;
  }

  list.forEach(c=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div>
        <div class="brand">${c.brand}</div>
        <div class="code">${c.code}</div>
      </div>
      <div class="actions">
        <button class="copy">Copy</button>
        <button class="save">${savedCoupons.find(s=>s.code===c.code)?"Saved":"Save"}</button>
      </div>
    `;

    card.onclick = ()=> window.open(c.link, "_blank");

    card.querySelector(".copy").onclick = (e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(c.code);
      showToast("Copied!");
    };

    card.querySelector(".save").onclick = (e)=>{
      e.stopPropagation();
      if(!savedCoupons.find(s=>s.code===c.code)){
        savedCoupons.push(c);
        localStorage.setItem("savedCoupons", JSON.stringify(savedCoupons));
        showToast("Saved!");
        render(coupons);
      }
    };

    container.appendChild(card);
  });
}

// Search
document.getElementById("search").addEventListener("input", e=>{
  const val = e.target.value.toLowerCase();
  const filtered = coupons.filter(c =>
    c.brand.toLowerCase().includes(val) ||
    c.code.toLowerCase().includes(val)
  );
  render(filtered);
});

// Navigation
function setActive(btn){
  document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function showAll(){
  setActive(document.getElementById("allBtn"));
  render(coupons);
}

function showSaved(){
  setActive(document.getElementById("savedBtn"));
  render(savedCoupons);
}

function showOffers(){
  showToast("Offers coming soon 🚀");
}

// Toast
function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// Init
render(coupons);
</script>

</body>
</html>
